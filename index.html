<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jornada do Cliente — Linha Cronológica Interativa</title>

  <!-- Google Fonts: Poppins -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Font Awesome CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Detalhes minimalistas do fundo -->
  <div class="bg-decor">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="grid-overlay"></div>
  </div>

  <!-- Barra superior -->
  <header class="topbar">
    <div class="brand">
      <div class="brand-logo"><i class="fa-solid fa-route"></i></div>
      <div class="brand-text">
        <h1>Jornada do Cliente</h1>
        <p>Linha cronológica interativa das 6 etapas da experiência</p>
      </div>
    </div>
    <nav class="topbar-actions">
      <span class="pill"><i class="fa-solid fa-circle-dot"></i> Ao vivo</span>
      <span class="pill ghost"><i class="fa-regular fa-compass"></i> UX Premium</span>
    </nav>
  </header>

  <!-- Conteúdo principal -->
  <main class="container">
    <section class="intro">
      <h2>Da <span class="grad">descoberta</span> à <span class="grad alt">recomendação</span></h2>
      <p>Explore cada etapa da jornada. Passe o mouse para sentir, clique para mergulhar nos detalhes.</p>
    </section>

    <!-- Timeline -->
    <section class="timeline" id="timeline">
      <!-- Linha conectora animada -->
      <div class="timeline-line">
        <div class="timeline-line-fill"></div>
      </div>

      <!-- As etapas serão injetadas via JS -->
    </section>
  </main>

  <!-- Modal -->
  <div class="modal-backdrop" id="modalBackdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button class="modal-close" id="modalClose" aria-label="Fechar">
        <i class="fa-solid fa-xmark"></i>
      </button>
      <div class="modal-header">
        <div class="modal-icon" id="modalIcon"><i class="fa-solid fa-compass"></i></div>
        <div>
          <span class="modal-step" id="modalStep">Etapa 01</span>
          <h3 id="modalTitle">Título</h3>
        </div>
      </div>
      <div class="modal-body">
        <p id="modalDesc"></p>
        <div id="modalCustom"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-primary" id="modalCloseBtn">Entendi</button>
      </div>
    </div>
  </div>

  <footer class="footer">
    <p>© <span id="year"></span> · Construído com HTML, CSS e JS puros · Design por você</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
